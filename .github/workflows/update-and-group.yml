name: Update and Group JSON API

on:
  repository_dispatch:
    types: [game-images-updated]
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: "Force download (ignore existing files)"
        required: false
        default: false
        type: boolean
      languages:
        description: "Comma-separated folder codes (e.g. en,ru,uk) or 'all'. Empty = use vars.LANGUAGES."
        required: false
        default: ""
        type: string
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-and-group:
    if: github.event_name != 'pull_request' || github.head_ref == 'chore/upstream-sync' || github.head_ref == 'chore/catalog-sync'
    runs-on: ubuntu-latest

    env:
      LANGUAGES: ${{ github.event.inputs.languages || vars.LANGUAGES || 'en,pt-BR' }}
      FORCE_FLAG: ${{ github.event.inputs.force == 'true' && '--force' || '' }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Validate LANGUAGES env
        run: |
          echo "LANGUAGES=${LANGUAGES}"
          if [ -z "${LANGUAGES}" ]; then
            echo "LANGUAGES is empty"
            exit 1
          fi
          if [[ "${LANGUAGES}" != *"en"* ]] || [[ "${LANGUAGES}" != *"pt-BR"* ]]; then
            echo "LANGUAGES must include en and pt-BR"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # Update step
      - name: Update data
        id: update-data
        run: node update.js $FORCE_FLAG --languages "${LANGUAGES}"

      # Group step
      - name: Group data
        id: group-data
        run: node group.js $FORCE_FLAG --languages "${LANGUAGES}"

      - name: Validate required outputs
        run: |
          test -f public/api/en/skins.json
          test -f public/api/en/collections.json
          test -f public/api/pt-BR/skins.json
          test -f public/api/pt-BR/collections.json

      - name: Generate manifest.json
        run: |
          node --input-type=module <<'EOF'
          import fs from "node:fs";
          import path from "node:path";
          import crypto from "node:crypto";

          const languages = ["en", "pt-BR"];
          const baseDir = "public/api";
          const manifestPath = path.join(baseDir, "manifest.json");

          const sha256 = buf => crypto.createHash("sha256").update(buf).digest("hex");

          const manifest = {
            version: process.env.GITHUB_SHA || "local",
            generated_at: new Date().toISOString(),
            languages,
            files: {},
          };

          for (const lang of languages) {
            manifest.files[lang] = {};
            const langDir = path.join(baseDir, lang);
            const files = fs
              .readdirSync(langDir, { withFileTypes: true })
              .filter(entry => entry.isFile() && entry.name.endsWith(".json"))
              .map(entry => entry.name)
              .sort();

            for (const file of files) {
              const fullPath = path.join(langDir, file);
              const raw = fs.readFileSync(fullPath);
              manifest.files[lang][file] = {
                path: `/${baseDir}/${lang}/${file}`,
                bytes: raw.length,
                sha256: sha256(raw),
              };
            }
          }

          const manifestRaw = Buffer.from(JSON.stringify(manifest, null, 2));
          manifest.manifest_sha256 = sha256(manifestRaw);

          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          EOF

      - name: Validate manifest exists
        run: test -f public/api/manifest.json

      - name: Create or update catalog sync PR
        if: github.event_name != 'pull_request'
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.BOT_PR_TOKEN }}
          commit-message: "[bot::update-group] catalog sync ${{ github.run_id }}"
          branch: chore/catalog-sync
          base: main
          title: "chore: update generated catalog JSON"
          body: |
            Automated catalog update generated by Update and Group JSON API.
            This PR is configured for auto-merge after required checks pass.
          add-paths: |
            public/api/**
            manifestIdUpdate.txt
            imagesShaUpdate.txt
            manifestIdGroup.txt
            imagesShaGroup.txt
          delete-branch: false

      - name: Enable auto-merge for catalog sync PR
        if: github.event_name != 'pull_request' && steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.BOT_PR_TOKEN }}
        run: |
          gh pr merge "${{ steps.create-pr.outputs.pull-request-number }}" --auto --merge
