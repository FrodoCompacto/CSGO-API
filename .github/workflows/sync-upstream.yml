name: Sync Fork with Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: ByMykel/CSGO-API
      UPSTREAM_BRANCH: main
      SYNC_BRANCH: chore/upstream-sync

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git committer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync branch from upstream
        id: sync
        run: |
          set -euo pipefail

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"
          git fetch origin main

          git checkout -B "${SYNC_BRANCH}" "origin/main"

          if git merge --no-ff --no-edit "upstream/${UPSTREAM_BRANCH}"; then
            if git diff --quiet "origin/main...HEAD"; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Upstream merge conflict detected. Manual sync is required."
            exit 1
          fi

      - name: Push sync branch
        if: steps.sync.outputs.changed == 'true'
        run: |
          git push --force-with-lease origin "${SYNC_BRANCH}"

      - name: Create or update PR
        if: steps.sync.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.BOT_PR_TOKEN_SYNC }}
        run: |
          set -euo pipefail

          PR_NUMBER="$(gh pr list --head "${SYNC_BRANCH}" --base main --state open --json number --jq '.[0].number')"

          if [ -z "${PR_NUMBER}" ]; then
            AHEAD_BY="$(gh api "repos/${GITHUB_REPOSITORY}/compare/main...${SYNC_BRANCH}" --jq '.ahead_by')"
            if [ "${AHEAD_BY}" = "0" ]; then
              echo "No commits ahead of main for ${SYNC_BRANCH}; skipping PR creation."
              echo "number=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            gh pr create \
              --base main \
              --head "${SYNC_BRANCH}" \
              --title "chore: sync fork with upstream" \
              --body "Automated weekly upstream sync. This PR will be auto-merged after required checks pass."
            PR_NUMBER="$(gh pr list --head "${SYNC_BRANCH}" --base main --state open --json number --jq '.[0].number')"
          fi

          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_PR_TOKEN_SYNC }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" --auto --merge
