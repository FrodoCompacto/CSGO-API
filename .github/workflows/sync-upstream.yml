name: Sync Fork with Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: ByMykel/CSGO-API
      UPSTREAM_BRANCH: main
      SYNC_BRANCH: chore/upstream-sync

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git committer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync branch from upstream
        id: sync
        run: |
          set -euo pipefail

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"
          git fetch origin main

          git checkout -B "${SYNC_BRANCH}" "origin/main"

          if git merge --no-ff --no-edit "upstream/${UPSTREAM_BRANCH}"; then
            if git diff --quiet "origin/main...HEAD"; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Upstream merge conflict detected. Manual sync is required."
            exit 1
          fi

      - name: Push sync branch
        if: steps.sync.outputs.changed == 'true'
        run: |
          git push --force-with-lease origin "${SYNC_BRANCH}"

      - name: Create or update PR
        if: steps.sync.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.BOT_PR_TOKEN_SYNC }}
        run: |
          set -euo pipefail

          PR_NUMBER="$(gh pr list --head "${SYNC_BRANCH}" --base main --state open --json number --jq '.[0].number')"

          if [ -z "${PR_NUMBER}" ]; then
            # The branch ref can take a few seconds to become queryable after push.
            for attempt in 1 2 3 4 5 6; do
              git fetch --no-tags origin main "${SYNC_BRANCH}" >/dev/null 2>&1 || true
              AHEAD_BY="$(git rev-list --right-only --count "origin/main...origin/${SYNC_BRANCH}" 2>/dev/null || echo 0)"
              if [ "${AHEAD_BY}" = "0" ]; then
                echo "No commits ahead of main for ${SYNC_BRANCH}; skipping PR creation."
                echo "number=" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              CREATE_OUTPUT="$(gh pr create \
                --base main \
                --head "${SYNC_BRANCH}" \
                --title "chore: sync fork with upstream" \
                --body "Automated weekly upstream sync. This PR will be auto-merged after required checks pass." 2>&1)" || CREATE_EXIT=$?

              if [ "${CREATE_EXIT:-0}" -eq 0 ]; then
                break
              fi

              if printf '%s' "${CREATE_OUTPUT}" | grep -q "No commits between"; then
                echo "No commits between main and ${SYNC_BRANCH}; skipping PR creation."
                echo "number=" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              echo "PR creation attempt ${attempt} failed, retrying in 5s..."
              sleep 5
            done

            PR_NUMBER="$(gh pr list --head "${SYNC_BRANCH}" --base main --state open --json number --jq '.[0].number')"
            if [ -z "${PR_NUMBER}" ]; then
              echo "Failed to create or locate PR for ${SYNC_BRANCH}."
              exit 1
            fi
          fi

          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.sync.outputs.changed == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.BOT_PR_TOKEN_SYNC }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" --auto --merge
